services:
  - type: web
    name: nextplate-backend
    env: docker
    plan: free
    region: singapore
    healthCheckPath: /api/ai/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
